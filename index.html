<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cena 3D com Three.js</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #f8dbe8 0%, #fdf6fa 100%);
      font-family: Arial, sans-serif;
    }

    #scene-container {
      width: 100vw;
      height: 100vh;
    }

    .info {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      color: #333;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .info h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .info p {
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="info">
    <h1>Modelo 3D Interativo</h1>
    <p>Use o mouse para rotacionar, aproximar e mover a câmera.</p>
  </div>

  <div id="scene-container"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
